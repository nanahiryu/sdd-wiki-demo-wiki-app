# wiki-app 側の Reusable Workflow
# ソースリポジトリから呼び出され、ドキュメントを受け取って配置する
name: Receive Docs

on:
  workflow_call:
    inputs:
      source-repo:
        description: "ソースリポジトリ名 (e.g. sdd-wiki-demo-pj-a)"
        required: true
        type: string
      mappings:
        description: 'JSON array of {docs-path, dest-path}. dest-path は docs/{source-repo}/ 配下のサブパス (e.g. [{"docs-path":"docs","dest-path":""}])'
        required: true
        type: string
    secrets:
      GH_APP_ID:
        required: true
      GH_APP_PRIVATE_KEY:
        required: true

jobs:
  sync:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      matrix:
        mapping: ${{ fromJSON(inputs.mappings) }}
    steps:
      - name: Generate App Token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          repositories: sdd-wiki-demo-wiki-app

      - name: Checkout wiki-app
        uses: actions/checkout@v4
        with:
          repository: nanahiryu/sdd-wiki-demo-wiki-app
          token: ${{ steps.app-token.outputs.token }}
          path: wiki-app

      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          repository: nanahiryu/${{ inputs.source-repo }}
          token: ${{ github.token }}
          path: source-repo

      - name: Validate paths
        env:
          SOURCE_REPO: ${{ inputs.source-repo }}
          DOCS_PATH: ${{ matrix.mapping.docs-path }}
          DEST_PATH: ${{ matrix.mapping.dest-path }}
        run: |
          wiki-app/scripts/ci/validate-path.sh "source-repo" "$SOURCE_REPO"
          wiki-app/scripts/ci/validate-path.sh "docs-path" "$DOCS_PATH"
          wiki-app/scripts/ci/validate-path.sh "dest-path" "$DEST_PATH" --allow-empty

      - name: Sync docs
        env:
          DEST_DIR: docs/${{ inputs.source-repo }}/${{ matrix.mapping.dest-path }}
          DOCS_PATH: ${{ matrix.mapping.docs-path }}
        run: |
          DEST_DIR="${DEST_DIR%/}"
          mkdir -p "wiki-app/${DEST_DIR}"
          rm -rf "wiki-app/${DEST_DIR}/"*
          cp -r "source-repo/${DOCS_PATH}/"* "wiki-app/${DEST_DIR}/"

      - name: Commit and push
        working-directory: wiki-app
        env:
          DOCS_PATH: ${{ matrix.mapping.docs-path }}
          SOURCE_REPO: ${{ inputs.source-repo }}
        run: |
          git config user.name "sdd-wiki-demo-bot[bot]"
          git config user.email "sdd-wiki-demo-bot[bot]@users.noreply.github.com"

          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "docs: sync ${DOCS_PATH} from ${SOURCE_REPO}"
            git push
          fi
