# wiki-app 側の Reusable Workflow
# ソースリポジトリから呼び出され、ドキュメントを受け取って配置する
name: Receive Docs

on:
  workflow_call:
    inputs:
      source-repo:
        description: "ソースリポジトリ名 (e.g. sdd-wiki-demo-pj-a)"
        required: true
        type: string
      mappings:
        description: 'JSON array of {docs-path, dest-path} (e.g. [{"docs-path":"docs","dest-path":"docs/pj-a"}])'
        required: true
        type: string
    secrets:
      GH_APP_ID:
        required: true
      GH_APP_PRIVATE_KEY:
        required: true

jobs:
  sync:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      matrix:
        mapping: ${{ fromJSON(inputs.mappings) }}
    steps:
      - name: Generate App Token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          repositories: sdd-wiki-demo-wiki-app

      - name: Checkout wiki-app
        uses: actions/checkout@v4
        with:
          repository: nanahiryu/sdd-wiki-demo-wiki-app
          token: ${{ steps.app-token.outputs.token }}
          path: wiki-app

      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          repository: nanahiryu/${{ inputs.source-repo }}
          token: ${{ github.token }}
          path: source-repo

      - name: Sync docs
        run: |
          mkdir -p wiki-app/${{ matrix.mapping.dest-path }}
          rm -rf wiki-app/${{ matrix.mapping.dest-path }}/*
          cp -r source-repo/${{ matrix.mapping.docs-path }}/* wiki-app/${{ matrix.mapping.dest-path }}/

      - name: Commit and push
        working-directory: wiki-app
        run: |
          git config user.name "sdd-wiki-demo-bot[bot]"
          git config user.email "sdd-wiki-demo-bot[bot]@users.noreply.github.com"

          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "docs: sync ${{ matrix.mapping.docs-path }} from ${{ inputs.source-repo }}"
            git push
          fi
